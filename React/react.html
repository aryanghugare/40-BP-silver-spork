    <script type="text/babel">
      const greeting = "";
      function Message(props) {
        return (
          <span>
            {props.msg}
            <br />
          </span>
        );
      }

      function Box(props) {
        console.log(props);
        return <div className="box container">{props.children}</div>;
      }
      function handleClick() {
        console.log("clicked");
      }
      //   {} - interpolation
      // accepts javascript expression.
      const section = (
        <section onClick={handleClick}>
          {greeting ? greeting : "Hey"}
          {greeting ? <span>{greeting}</span> : null}
          <br />
          {Message({ msg: "Hi from react" })}
          {Message({ msg: "Hello students" })}
          // regular way of calling a function
          {Message({ msg: "are you understanding react?" })}
          // same thing can be done in react as shown below
          <br />
          <Message msg="from this element" />
          <Box />
          <Box xyz="some value">
            <p>child</p>
          </Box>
        </section>
      );

      console.log(section);
      const root = document.getElementById("root");
      // entry point for react. react takes over dom creation 👇🏼
      createRoot(root).render(section);
    </script>
